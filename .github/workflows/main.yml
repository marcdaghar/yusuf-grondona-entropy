name: CI - Yusuf Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy matplotlib pandas mesa
    
    - name: Check that all Python files compile
      run: |
        python -m py_compile yusuf_model.py
        python -m py_compile grondona_crd.py
        python -m py_compile neurocognitive_agents.py
        python -m py_compile ricci_flow.py
        python -m py_compile statistical_validation.py
        python -m py_compile streamlit_app.py
        echo "✅ All files have valid syntax"
    
    - name: Quick import test
      run: |
        python -c "from yusuf_model import YusufConfig; print('✅ yusuf_model OK')"
        python -c "from grondona_crd import GrondonaCRD; print('✅ grondona_crd OK')"
        echo "✅ All imports working"
