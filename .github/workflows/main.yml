name: CI - Tests Yusuf

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements.txt
          pip install pytest
      
      - name: Run basic import test
        run: |
          python -c "from yusuf_model import YusufConfig; print('✅ yusuf_model OK')"
          python -c "from grondona_crd import GrondonaCRD; print('✅ grondona_crd OK')"
          python -c "from neurocognitive_agents import NeurocognitiveAgent; print('✅ neurocognitive_agents OK')"
          python -c "from ricci_flow import RicciFlow; print('✅ ricci_flow OK')"
          python -c "from statistical_validation import StatisticalValidator; print('✅ statistical_validation OK')"
      
      - name: Run simple simulation test
        run: |
          python -c "
from yusuf_model import YusufConfig, YusufSystem, CapitalistSystem
config = YusufConfig(T=10, dt=0.5, noise_amplitude=0.0)
yusuf = YusufSystem(config)
capitalist = CapitalistSystem(config)
y_res = yusuf.run()
c_res = capitalist.run()
print(f'Yusuf solvability: {y_res.solvency_rate}%')
print(f'Capitalist solvability: {c_res.solvency_rate}%')

.github/workflows/test.yml
assert y_res.solvency_rate >= c_res.solvency_rate, 'Yusuf should be more resilient'
print('✅ Simulation test passed')
"
